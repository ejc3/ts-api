name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Protobuf codegen is up to date
        # git add -N stages untracked files as empty so a newly generated file
        # surfaces in the diff instead of slipping past --exit-code.
        run: |
          pnpm exec buf generate
          git add -N src/grpc/gen
          git diff --exit-code src/grpc/gen
      - name: Format + lint (biome)
        run: pnpm exec biome ci .
      - name: Typecheck
        run: pnpm exec tsc --noEmit
      - name: Test
        run: pnpm exec vitest run
      - name: Cloudflare build smoke (dry run)
        run: pnpm exec wrangler deploy --dry-run --outdir dist/worker
