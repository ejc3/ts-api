name: Smoke (production)

# Read-only liveness check of both production deployments. Runs on demand and on a
# daily schedule; it never writes, so it leaves no rows behind. Both deploy workflows
# already smoke their live URL inline after deploying (deploy-cloudflare.yml,
# deploy-vercel.yml); this scheduled run re-checks both daily.
on:
  workflow_dispatch:
  schedule:
    - cron: '17 8 * * *'

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Vercel — all five styles
        run: node scripts/smoke.mjs --url https://ts-api.vercel.app
      - name: Cloudflare Worker — the three Fetch styles
        run: node scripts/smoke.mjs --url https://ts-api.ejc3-ts.workers.dev --styles rest,trpc,graphql
