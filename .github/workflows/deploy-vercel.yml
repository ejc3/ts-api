name: Deploy (Vercel)

# Fast, gated production deploy. On every push to main we stage a PRODUCTION build on
# Vercel's own infra without promoting it (--skip-domain), so it runs in parallel with
# CI and does not go live. We then wait for CI to pass on this exact commit and promote
# that build to production — a ~3 s alias flip. The build overlaps the CI wait instead
# of stacking after it, and a red CI never promotes. A manual workflow_dispatch promotes
# without waiting for CI (the on-demand escape hatch).
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  actions: read # gh run list — read the CI run's conclusion for this commit

# One deploy at a time; let an in-flight promote finish rather than cancel it.
concurrency:
  group: deploy-vercel
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    # The Vercel CLI and gh read these from the environment, so no secret is ever passed
    # on argv. ORG/PROJECT id select the project in place of the gitignored .vercel/.
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Cache the Vercel CLI install
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: vercel-cli-${{ runner.os }}
      - name: Install Vercel CLI
        run: npm i -g vercel@latest
      - name: Stage a production build (parallel with CI, not promoted)
        id: stage
        # --skip-domain builds a production deployment (production env) without moving the
        # production alias, so it does not go live until the promote step below. Tag it
        # with the commit so nothing else can be promoted by mistake.
        run: |
          url=$(vercel deploy --prod --skip-domain --yes -m gitsha="$GITHUB_SHA" 2>/dev/null \
            | grep -oE 'https://[a-z0-9-]+\.vercel\.app' | tail -1)
          if [ -z "$url" ]; then echo "no staged deployment url"; exit 1; fi
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "staged: $url"
      - name: Wait for CI to pass on this commit (the gate)
        if: github.event_name != 'workflow_dispatch'
        run: |
          for i in $(seq 1 60); do
            verdict=$(gh run list --commit "$GITHUB_SHA" --workflow CI --limit 1 \
              --json status,conclusion --jq '.[0] | (.status + "/" + (.conclusion // "-"))' 2>/dev/null || echo "")
            echo "CI: ${verdict:-<no run yet>}"
            case "$verdict" in
              completed/success) exit 0 ;;
              completed/*) echo "CI did not pass — not promoting"; exit 1 ;;
            esac
            sleep 5
          done
          echo "timed out waiting for CI"; exit 1
      - name: Promote the CI-validated build to production
        run: vercel promote "${{ steps.stage.outputs.url }}" --yes
      - name: Smoke the live deployment
        # The Vercel deployment serves all five styles (gRPC and Express are Node-only
        # functions here); a non-2xx on any read fails the deploy.
        run: node scripts/smoke.mjs --url https://ts-api.vercel.app
